name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.1", "3.2", "3.3", "3.4", "4.0", "truffleruby"]
        rails-version: ["6.1", "7.0", "7.1", "7.2", "8.0", "8.1", "edge"]
        include:
          - ruby-version: "3.3"
            rails-version: "8.0"
            code-coverage: true
        exclude:
          - ruby-version: "3.1"
            rails-version: "8.0"
          - ruby-version: "3.1"
            rails-version: "8.1"
          - ruby-version: "3.1"
            rails-version: "edge"
          - ruby-version: "3.2"
            rails-version: "edge"
          - ruby-version: "4.0"
            rails-version: "6.1"
          - ruby-version: "4.0"
            rails-version: "7.0"
          - ruby-version: "4.0"
            rails-version: "7.1"
          - ruby-version: "4.0"
            rails-version: "7.2"
          - ruby-version: "truffleruby"
            rails-version: "8.1"
          - ruby-version: "truffleruby"
            rails-version: "edge"
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails-version }}.gemfile

    name: Specs - Ruby ${{ matrix.ruby-version }} on Rails ${{ matrix.rails-version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Ruby ${{ matrix.ruby-version }} on Rails ${{ matrix.rails-version }}
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run RSpec
        env:
          ENABLE_CODE_COVERAGE: ${{ matrix.code-coverage || 'false' }}
        run: |
          bundle exec rspec --format documentation

  required:
    name: Tests Required
    if: ${{ always() }}
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check matrix result
        env:
          RESULT: ${{ needs.test.result }}
        run: |
          if [ "$RESULT" != "success" ]; then
            echo "Tests matrix result: $RESULT"
            exit 1
          fi
