name: zizmor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  audit:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      actions: read # Required by upload-sarif to read workflow run metadata.
      contents: read # Required to check out repository workflows.
      security-events: write # Required by upload-sarif to publish zizmor SARIF results.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@a16621b09c6db4281f81a93cb393b05dcd7b7165 # v0.5.5
        with:
          persona: pedantic
