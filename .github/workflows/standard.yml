name: StandardRB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write # Required for RuboCop's GitHub formatter to annotate checks.
      contents: read
    strategy:
      fail-fast: true
      matrix:
        ruby-version:
          - "3.3"
        rails-version:
          - "8.0"
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails-version }}.gemfile

    name: StandardRB - Ruby ${{ matrix.ruby-version }} on Rails ${{ matrix.rails-version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Ruby ${{ matrix.ruby-version }} on Rails ${{ matrix.rails-version }}
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run StandardRB (via Rubocop)
        run: |
          bundle exec rubocop --format offenses --format github

  required:
    name: StandardRB Required
    if: ${{ always() }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check matrix result
        env:
          RESULT: ${{ needs.build.result }}
        run: |
          if [ "$RESULT" != "success" ]; then
            echo "StandardRB matrix result: $RESULT"
            exit 1
          fi
